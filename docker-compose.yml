x-go-service: &go-service
  restart: unless-stopped
  networks:
    - ego-network
  healthcheck:
    test: ["CMD-SHELL", "netstat -an | grep 8080 || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  docs:
    image: swaggerapi/swagger-ui:latest
    container_name: docs
    restart: unless-stopped
    environment:
      URLS: >
        [
          { "url": "/auth/docs/doc.json", "name": "Auth" },
          { "url": "/users/docs/doc.json", "name": "Users" }
        ]
    networks:
      - ego-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      users:
        condition: service_healthy
      auth:
        condition: service_healthy
    networks:
      - ego-network

  users:
    <<: *go-service
    build:
      context: .
      dockerfile: services/users/Dockerfile
    container_name: users
    env_file:
      - ./services/users/.env
    depends_on:
      users-db:
        condition: service_healthy

  users-db:
    image: postgres:15.8-alpine
    container_name: users-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
      POSTGRES_DB: ${USERS_DB_NAME}
    ports:
      - "${USERS_DB_PORT}:5432"
    volumes:
      - ./data/users-db:/var/lib/postgresql/data
    networks:
      - ego-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${USERS_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    <<: *go-service
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: auth
    env_file:
      - ./services/auth/.env
    volumes:
      - ./platform/credentials:/app/platform/credentials:ro

networks:
  ego-network:
    driver: bridge